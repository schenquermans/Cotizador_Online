<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotizador de espejos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
      padding: 2rem 1rem;
    }

    .cotizador {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      border: 1px solid #e0e0e0;
    }

    /* =====================
       TÍTULO
       ===================== */
    .cot-titulo {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #111;
    }
    .cot-subtitulo {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.75rem;
    }

    /* =====================
       SECCIONES
       ===================== */
    .cot-seccion {
      margin-bottom: 1.4rem;
    }
    .cot-etiqueta {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 8px;
    }
    .cot-opciones {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* =====================
       BOTONES DE OPCIÓN
       ===================== */
    .cot-opcion {
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cot-opcion:hover:not(:disabled) {
      background: #f0f0f0;
      border-color: #bbb;
    }

    /* Seleccionado — cambiá estos colores si querés otro color de marca */
    .cot-opcion.activo {
      background: #EEF4FF;
      border-color: #4A7CF6;
      color: #2356D4;
      font-weight: 600;
    }

    /* Deshabilitado (combinación no disponible) */
    .cot-opcion:disabled {
      opacity: 0.28;
      cursor: not-allowed;
      background: #f5f5f5;
      border-color: #e0e0e0;
      color: #aaa;
    }

    /* Sección bloqueada (todavía no llegó el turno) */
    .cot-seccion.bloqueada .cot-etiqueta {
      color: #ccc;
    }
    .cot-seccion.bloqueada .cot-opcion {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* =====================
       SEPARADOR
       ===================== */
    .separador {
      border: none;
      border-top: 1px solid #eee;
      margin: 1.75rem 0;
    }

    /* =====================
       RESUMEN
       ===================== */
    .cot-resumen {
      background: #f7f7f7;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .resumen-titulo {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 10px;
    }
    .resumen-fila {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 4px 0;
      color: #666;
    }
    .resumen-fila span:last-child {
      color: #111;
      font-weight: 600;
    }

    /* =====================
       BOTÓN WHATSAPP
       ===================== */
    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-whatsapp:hover { background: #1EBD5A; }
    .btn-whatsapp:disabled {
      background: #ccc;
      color: #fff;
      cursor: not-allowed;
    }
    .btn-whatsapp svg {
      width: 20px; height: 20px;
      fill: #fff; flex-shrink: 0;
    }
    .cot-nota {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>

/* ============================================================
   LÓGICA — no hace falta tocar nada de acá para abajo
   ============================================================ */

// Estado actual
const sel = { modelo: null, borde: null, tam: null, luz: null };

// Helpers: qué valores son posibles dado el estado actual
function posibles(campo) {
  const idx = { modelo: 0, borde: 1, tam: 2, luz: 3 }[campo];
  return [...new Set(
    COMBINACIONES
      .filter(r =>
        (sel.modelo == null || r[0] === sel.modelo) &&
        (sel.borde  == null || r[1] === sel.borde)  &&
        (sel.tam    == null || r[2] === sel.tam)     &&
        (sel.luz    == null || r[3] === sel.luz)
      )
      .map(r => r[idx])
  )];
}

// Construir botones para una sección, en orden de aparición en la tabla
function valoresUnicos(campo) {
  const idx = { modelo: 0, borde: 1, tam: 2, luz: 3 }[campo];
  return [...new Set(COMBINACIONES.map(r => r[idx]))];
}

// Renderizar botones de una sección
function renderSeccion(campo, contenedorId) {
  const cont = document.getElementById(contenedorId);
  const valores = valoresUnicos(campo);
  cont.innerHTML = "";
  valores.forEach(v => {
    const btn = document.createElement("button");
    btn.className = "cot-opcion";
    btn.textContent = v;
    btn.dataset.campo = campo;
    btn.dataset.valor = v;
    btn.addEventListener("click", () => elegir(campo, v));
    cont.appendChild(btn);
  });
}

// Al elegir una opción
function elegir(campo, valor) {
  // Si el usuario cambia modelo o borde, resetear los siguientes
  if (campo === "modelo") { sel.borde = null; sel.tam = null; sel.luz = null; }
  if (campo === "borde")  { sel.tam = null; sel.luz = null; }
  if (campo === "tam")    { sel.luz = null; }
  sel[campo] = valor;
  actualizar();
}

// Actualizar todo el UI
function actualizar() {
  const campos = ["modelo","borde","tam","luz"];
  const contenedores = { modelo:"opt-modelo", borde:"opt-borde", tam:"opt-tam", luz:"opt-luz" };
  const secciones    = { modelo:"sec-modelo", borde:"sec-borde", tam:"sec-tam",  luz:"sec-luz" };

  campos.forEach((campo, i) => {
    const cont = document.getElementById(contenedores[campo]);
    const sec  = document.getElementById(secciones[campo]);
    const posi = posibles(campo);

    // Desbloquear sección si el paso anterior está completo
    const anterior = campos[i - 1];
    if (i === 0 || sel[anterior] != null) {
      sec.classList.remove("bloqueada");
    } else {
      sec.classList.add("bloqueada");
    }

    // Marcar activos y deshabilitar incompatibles
    cont.querySelectorAll(".cot-opcion").forEach(btn => {
      const v = btn.dataset.valor;
      btn.classList.toggle("activo", sel[campo] === v);
      btn.disabled = !posi.includes(v);
    });
  });

  // Resumen
  const resumen = document.getElementById("resumen");
  const filas   = document.getElementById("resumen-filas");
  const labels  = { modelo:"Modelo", borde:"Borde", tam:"Tamaño", luz:"Iluminación" };
  const llenos  = campos.filter(c => sel[c]);

  if (llenos.length > 0) {
    resumen.style.display = "block";
    filas.innerHTML = llenos.map(c =>
      `<div class="resumen-fila"><span>${labels[c]}</span><span>${sel[c]}</span></div>`
    ).join("");
  } else {
    resumen.style.display = "none";
  }

  // Botón WhatsApp
  const btn  = document.getElementById("btn-wa");
  const nota = document.getElementById("nota");
  const completo = campos.every(c => sel[c]);

  if (completo) {
    btn.disabled = false;
    nota.textContent = "¡Listo! Tocá el botón para abrir WhatsApp con tu consulta.";
    btn.onclick = () => {
      const msg =
        `¡Hola! Quisiera cotizar un espejo personalizado:\n\n` +
        `• Modelo: ${sel.modelo}\n` +
        `• Borde: ${sel.borde}\n` +
        `• Tamaño: ${sel.tam}\n` +
        `• Iluminación: ${sel.luz}\n\n` +
        `¿Podrían darme un presupuesto? ¡Gracias!`;
      window.open(`https://wa.me/${NUMERO_WA}?text=${encodeURIComponent(msg)}`, "_blank");
    };
  } else {
    btn.disabled = true;
    const siguiente = campos.find(c => !sel[c]);
    const nombres = { modelo:"el modelo", borde:"el tipo de borde", tam:"el tamaño", luz:"la iluminación" };
    nota.textContent = `Elegí ${nombres[siguiente]} para continuar`;
  }
}

// Inicializar botones
renderSeccion("modelo", "opt-modelo");
renderSeccion("borde",  "opt-borde");
renderSeccion("tam",    "opt-tam");
renderSeccion("luz",    "opt-luz");
actualizar();
</script>
